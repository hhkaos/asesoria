repos:
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        files: ^backend/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.3.3
    hooks:
      - id: prettier
        files: ^frontend/src/
        types_or: [ts, tsx, css, json]

  - repo: local
    hooks:
      - id: tests-unitarios-backend
        name: Tests unitarios backend (rápidos)
        # -T evita allocar una TTY (necesario en pre-commit)
        entry: docker compose run --rm -T backend pytest tests/unit -x -q --no-header
        language: system
        pass_filenames: false
        files: ^backend/
        # Requiere que Docker esté en ejecución
